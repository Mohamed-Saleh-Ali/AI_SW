<!-- here i am doing the sign up form for the coding school 
    using fieldset bcs we dont have css
    labels are linked to inputs so when i click on name it goes to the box 
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
</head>
<body>

<h1>Coding School Sign Up</h1>
<p>Join our bootcamps and start your coding journey today!</p>
<!-- I used Form with input of NAME , email , telephone and select with 2 options of courses
      with submit button with sign up label 
      All of them required , used Fieldset for grouping -->
<form>
  <fieldset>
     <legend>Candidate Information</legend>
     
     <label for="fname">Name:</label>
     <input type="text" id="fname" required> <br><br>

        <label for="email">Email:</label>
      <input type="email" id="email" required> <br><br>

     <label for="tel">Telephone:</label>
     <input type="tel" id="tel" required> <br><br>

     <label for="camp">Bootcamp:</label>
     <select id="camp" required>
        <option value="">-- pick one --</option>
        <option value="web">Web Development</option>
        <option value="data">Data Science</option>
     </select>

     <button type="submit">Sign Up</button>
  </fieldset>
</form>

</body>
</html>
