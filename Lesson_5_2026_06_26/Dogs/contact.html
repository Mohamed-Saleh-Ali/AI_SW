<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Dog Adoption | Contact</title>
        <link rel="stylesheet" href="../master_styles.css" />
    </head>
    <body>
        <div id="sticky-header" class="flex-nav">
          <h1 style="color: white; margin: 0;">Dog Adoption</h1>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="adopt.html">Adopt a Dog</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </div>

        <div class="box-model-example">
            <h1>Get in Touch</h1>
            <p>Adopt a dog by contacting us below:</p>
            
            <form style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">  
                <label>Name:</label>
                <input type="text" name="name" style="padding: 5px;">
                
                <label>Email:</label>
                <input type="email" name="email" style="padding: 5px;">
                
                <label>Message:</label>
                <textarea name="message" rows="4" style="padding: 5px;"></textarea>
                
                <button type="submit" style="padding: 6px 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; align-self: flex-start;">Submit</button>
            </form>

            <p style="margin-top: 20px; font-size: 0.8rem; text-align: center;">© 2026 Dog Adoption Agency.</p>
        </div>
    </body>
