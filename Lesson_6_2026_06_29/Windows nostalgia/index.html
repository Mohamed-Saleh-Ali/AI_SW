<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Windows Nostalgia</title>
</head>
<body>
  
  <div class="window">
    <!-- Title Bar -->
    <div class="title-bar">
      <span>Kernel panic</span>
    </div>
    
    <!-- Window Content -->
    <div class="content">
      <div class="message-area">
        <img 
          src="https://i.postimg.cc/wTQJ3hgb/error.png" 
          width="40" 
          height="40" 
          alt="Error Icon" 
        />
        <p   display: flex >Please shut down your computer, and go for a walk.</p>
      </div>
      
      <!-- Button aligned to the right -->
      <div class="button-area">
        <button>Cancel</button>
      </div>
    </div>
  </div>

</body>
</html>
