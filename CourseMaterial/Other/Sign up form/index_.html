 <!-- Here i made a simple Main html head default structure
then the Body instead of Main
Form have the candidate information and the fieldset 
and legend to group the form elements


-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding School Sign Up</title>
  </head>
  
  <body>
      <h1>Coding School Sign Up</h1>
      <p>Join our bootcamps and start your coding journey today!</p>
      
    <form action="#" method="POST">
      <fieldset>
        <legend>Candidate Information</legend>
        
        <div>
          <label for="fullName">Name:</label>
          <input type="text" id="fullName" name="fullName" required />
        </div>
  
        
  
        <div>
          <label for="emailAddress">Email:</label>
          <input type="email" id="emailAddress" name="emailAddress" required />
        </div>
        
        
        <div>
          <label for="telephone">Telephone:</label>
          <input type="tel" id="telephone" name="telephone" required />
        </div>
        
        <div>
          <label for="bootcamp">Bootcamp:</label>
          <select id="bootcamp" name="bootcamp" required>
            <option value="">-- Please choose an option --</option>
            <option value="web-dev">Web Development</option>
            <option value="data-science">Data Science</option>
            <option value="ux-ui">UX/UI Design</option>
          </select>
        </div>
        
        <button type="submit">Sign Up</button>
      </fieldset>
    </form>
  </body>

  </html>
