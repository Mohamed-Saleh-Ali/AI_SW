<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding School Sign Up - Semantic</title>
  </head>

  <body>
    <header>
      <h1>Coding School Sign Up</h1>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Courses</a></li>
          <li><a href="#">Sign Up</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <header>
          <h2>Join our bootcamps and start your coding journey today!</h2>
        </header>
        
        <form action="#" method="POST">
          <fieldset>
            <legend>Candidate Information</legend>
            
            <div>
              <label for="fullName">Name:</label>
              <input type="text" id="fullName" name="fullName" required />
            </div>
            
            <div>
              <label for="emailAddress">Email:</label>
              <input type="email" id="emailAddress" name="emailAddress" required />
            </div>
            
            <div>
              <label for="telephone">Telephone:</label>
              <input type="tel" id="telephone" name="telephone" required />
            </div>
            
            <div>
              <label for="bootcamp">Bootcamp:</label>
              <select id="bootcamp" name="bootcamp" required>
                <option value="">-- Please choose an option --</option>
                <option value="web-dev">Web Development</option>
                <option value="data-science">Data Science</option>
                <option value="ux-ui">UX/UI Design</option>
              </select>
            </div>
            
            <button type="submit">Sign Up</button>
          </fieldset>
        </form>
      </section>

      <aside>
        <h3>Why choose us?</h3>
        <p>Our bootcamps are fully immersive, taught by industry experts, and designed to get you hired!</p>
      </aside>
    </main>

    <footer>
      <p>&copy; 2026 Coding School. All rights reserved.</p>
    </footer>
  </body>
</html>
